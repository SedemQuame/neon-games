version: "3.9"

services:
  gamehub-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamehub_backend
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      START_EMBEDDED_REDIS: ${START_EMBEDDED_REDIS:-true}
      GATEWAY_PORT: ${GATEWAY_PORT:-80}
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT:-8001}
      GAME_SESSION_PORT: ${GAME_SESSION_PORT:-8002}
      PAYMENT_GATEWAY_PORT: ${PAYMENT_GATEWAY_PORT:-8003}
      WALLET_SERVICE_PORT: ${WALLET_SERVICE_PORT:-8004}
      TRADER_POOL_PORT: ${TRADER_POOL_PORT:-8005}
      PAYMENT_GATEWAY_URL: http://127.0.0.1:${PAYMENT_GATEWAY_PORT:-8003}
      WALLET_SERVICE_URL: http://127.0.0.1:${WALLET_SERVICE_PORT:-8004}
      REDIS_ADDR: 127.0.0.1:6379
      REDIS_URL: ""
      REDISHOST: ""
      REDISPORT: ""
      REDISPASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${GATEWAY_PORT:-80}:${GATEWAY_PORT:-80}"
      - "${AUTH_SERVICE_PORT:-8001}:${AUTH_SERVICE_PORT:-8001}"
      - "${GAME_SESSION_PORT:-8002}:${GAME_SESSION_PORT:-8002}"
      - "${PAYMENT_GATEWAY_PORT:-8003}:${PAYMENT_GATEWAY_PORT:-8003}"
      - "${WALLET_SERVICE_PORT:-8004}:${WALLET_SERVICE_PORT:-8004}"
      - "${TRADER_POOL_PORT:-8005}:${TRADER_POOL_PORT:-8005}"
    volumes:
      - ./infra/dev-secrets:/app/secrets:ro
      - redis_data:/var/lib/redis
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:${GATEWAY_PORT:-80}/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  redis_data:
