[build]
dockerfilePath = "Dockerfile"

[build.args]
# Flutter web bakes this value into the compiled app at build time.
GAMEHUB_BASE_URL = "https://neon-games-production.up.railway.app"

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
