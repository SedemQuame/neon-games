<body class="bg-background text-on-surface font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar Navigation Shell -->
<header class="fixed top-0 w-full z-50 bg-slate-950/70 backdrop-blur-xl border-b border-white/10 flex justify-between items-center w-full px-4 h-16">
<div class="flex items-center gap-sm">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/5 active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<span class="text-xl font-black text-white italic tracking-tighter font-['Plus_Jakarta_Sans']">Glory Grid</span>
</div>
<div class="flex items-center gap-sm">
<div class="px-sm py-xs bg-surface-container-high rounded-lg border border-outline-variant/30">
<span class="font-label-md text-secondary-fixed-dim">$1,250.00</span>
</div>
<div class="w-8 h-8 rounded-full overflow-hidden border border-primary/20">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A high-quality, professional headshot of a person against a dark, moody background with subtle blue rim lighting. The style is modern and minimalist, reflecting a premium fintech user interface aesthetic. The lighting is soft and focused, emphasizing a clean and sophisticated persona consistent with a luxury gaming platform." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCBtcLbjazV7OHaRgKN4Xc08WxiOl3CYfBk0-Giex1Ijjvvl-WlkuNISXAhZoNL1igzpSGO5APtu08ii2THhr8vamJAR4Hw3B4ERppG0JtO22NC9HtFtOCpQvbgg426ZOasq5s2JYHGZqF__lFCOslEhMeKm8hzbtYnsOObGWAwx5BAVClUs8k3fSyRemqBzHmTC5xZgdisAJ2eS5mrkXlfdja1X_WUKSYti1NdlL0CY3flUdOMQCdWjM3vnLmcSoZmQArGCPjZNW8"/>
</div>
</div>
</header>
<main class="pt-24 pb-32 px-margin max-w-xl mx-auto space-y-lg">
<!-- Header Section -->
<section class="space-y-xs">
<h1 class="font-display text-display text-on-surface">Choose Payment Method</h1>
<p class="font-body-md text-on-surface-variant">Select your preferred gateway to instantly fund your grid account.</p>
</section>
<!-- Payment Options Bento -->
<section class="grid grid-cols-1 gap-gutter">
<!-- Mobile Money (Active State Example) -->
<button class="relative glass-panel rounded-xl p-md flex items-center justify-between group border-primary/50 bg-primary/5 active:scale-[0.98] transition-all">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">smartphone</span>
</div>
<div class="text-left">
<div class="flex items-center gap-sm">
<span class="font-h2 text-h2 text-on-surface">Mobile Money</span>
<span class="px-xs py-0.5 bg-primary-container/20 text-primary font-label-md rounded text-[10px] uppercase tracking-wider">Fastest</span>
</div>
<span class="font-body-md text-on-surface-variant">Instant • Min $1.00</span>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-primary"></div>
</div>
</button>
<!-- Crypto -->
<button class="glass-panel rounded-xl p-md flex items-center justify-between group hover:bg-white/5 active:scale-[0.98] transition-all">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-[28px]" style="font-variation-settings: 'FILL' 1;">currency_bitcoin</span>
</div>
<div class="text-left">
<div class="flex items-center gap-sm">
<span class="font-h2 text-h2 text-on-surface">Crypto</span>
<span class="px-xs py-0.5 bg-surface-container-highest text-on-surface-variant font-label-md rounded text-[10px] uppercase tracking-wider">No Limits</span>
</div>
<span class="font-body-md text-on-surface-variant">Instant • BTC, ETH, USDT</span>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-on-surface-variant transition-colors"></div>
</button>
<!-- Card -->
<button class="glass-panel rounded-xl p-md flex items-center justify-between group hover:bg-white/5 active:scale-[0.98] transition-all">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-[28px]" style="font-variation-settings: 'FILL' 1;">credit_card</span>
</div>
<div class="text-left">
<div class="flex items-center gap-sm">
<span class="font-h2 text-h2 text-on-surface">Credit/Debit Card</span>
</div>
<span class="font-body-md text-on-surface-variant">Instant • Visa, Mastercard</span>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-on-surface-variant transition-colors"></div>
</button>
</section>
<!-- Amount Selection -->
<section class="space-y-md glass-panel rounded-xl p-lg">
<div class="space-y-sm">
<label class="font-label-md text-on-surface-variant uppercase tracking-widest">Enter Amount</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 font-display text-display text-primary">$</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl py-lg pl-xl pr-md font-number-xl text-number-xl text-on-surface focus:border-primary focus:ring-0 focus:outline-none transition-colors" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Chips -->
<div class="flex flex-wrap gap-sm">
<button class="px-lg py-sm bg-surface-container-high hover:bg-surface-bright rounded-full font-label-md text-on-surface transition-colors">$10</button>
<button class="px-lg py-sm bg-surface-container-high hover:bg-surface-bright rounded-full font-label-md text-on-surface transition-colors">$50</button>
<button class="px-lg py-sm bg-primary-container text-on-primary-container rounded-full font-label-md transition-colors">$100</button>
<button class="px-lg py-sm bg-surface-container-high hover:bg-surface-bright rounded-full font-label-md text-on-surface transition-colors">$500</button>
</div>
<!-- Details -->
<div class="pt-md mt-md border-t border-white/5 space-y-sm">
<div class="flex justify-between items-center">
<span class="font-body-md text-on-surface-variant">Fee</span>
<span class="font-label-md text-primary">$0.00</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-md text-on-surface-variant">Estimated Time</span>
<span class="font-label-md text-secondary-fixed-dim">Instant</span>
</div>
</div>
</section>
<!-- CTA Action -->
<button class="w-full py-lg bg-primary-container text-on-primary-container font-h1 text-h1 rounded-xl inner-glow-primary active:scale-[0.97] transition-all flex items-center justify-center gap-sm">
            Proceed to Deposit
            <span class="material-symbols-outlined">bolt</span>
</button>
<!-- Trust Indicator -->
<div class="flex justify-center items-center gap-xs text-on-surface-variant opacity-50">
<span class="material-symbols-outlined text-[16px]">lock</span>
<span class="font-label-md text-[10px] uppercase tracking-tighter">Secure 256-bit Encrypted Transaction</span>
</div>
</main>

<nav class="fixed bottom-0 left-0 w-full h-20 bg-slate-950/80 backdrop-blur-2xl border-t border-slate-800 flex justify-around items-center px-6 pb-4 z-50 rounded-t-lg shadow-[0_-4px_20px_rgba(0,0,0,0.5)]">

<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold uppercase tracking-widest mt-1">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-blue-500 drop-shadow-[0_0_8px_rgba(19,127,236,0.5)] active:scale-90 transition-transform">

<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold uppercase tracking-widest mt-1">Wallet</span>
</button>

<span class="material-symbols-outlined" data-icon="groups">groups</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold uppercase tracking-widest mt-1">Multiplayer</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 hover:text-blue-300 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold uppercase tracking-widest mt-1">Profile</span>
</button>
